{% extends 'base.html' %}
{% block title %}Register — FilmCollab{% endblock %}

{% block content %}
<div class="form-page">
    <h1>Create an Account</h1>
    <p>Join FilmCollab to start collaborating on film projects.</p>

    <form id="registerForm" action="{{ url_for('register') }}" method="POST" novalidate>
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" placeholder="Choose a username" required>
            <span class="error-msg" id="usernameError"></span>
        </div>

        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="your@email.com" required>
            <span class="error-msg" id="emailError"></span>
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Min. 6 characters" required>
            <span class="error-msg" id="passwordError"></span>
        </div>

        <button type="submit" class="btn btn-full">Register</button>
    </form>

    <p class="form-link">Already have an account? <a href="{{ url_for('login') }}">Log in</a></p>
</div>
{% endblock %}
