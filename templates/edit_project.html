{% extends 'base.html' %}
{% block title %}Edit Project — FilmCollab{% endblock %}

{% block content %}
<div class="form-page">
    <h1>✏️ Edit Project</h1>

    <form id="projectForm" action="{{ url_for('edit_project', project_id=project.id) }}" method="POST" novalidate>
        <div class="form-group">
            <label for="title">Project Title</label>
            <input type="text" id="title" name="title" value="{{ project.title }}" required>
            <span class="error-msg" id="titleError"></span>
        </div>

        <div class="form-group">
            <label for="genre">Genre</label>
            <select id="genre" name="genre" required>
                {% for g in ['Drama','Comedy','Thriller','Horror','Action','Romance','Documentary','Sci-Fi','Animation','Other'] %}
                    <option {% if project.genre == g %}selected{% endif %}>{{ g }}</option>
                {% endfor %}
            </select>
            <span class="error-msg" id="genreError"></span>
        </div>

        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" name="description" rows="4">{{ project.description }}</textarea>
        </div>

        <button type="submit" class="btn btn-full">Save Changes</button>
        <a href="{{ url_for('project_detail', project_id=project.id) }}"
           class="btn btn-outline btn-full" style="margin-top:.5rem;">Cancel</a>
    </form>
</div>
{% endblock %}
