{% extends 'base.html' %}
{% block title %}Login — FilmCollab{% endblock %}

{% block content %}
<div class="form-page">
    <h1>Welcome Back</h1>
    <p>Log in to continue working on your film projects.</p>

    <form id="loginForm" action="{{ url_for('login') }}" method="POST" novalidate>
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" placeholder="Your username" required>
            <span class="error-msg" id="usernameError"></span>
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Your password" required>
            <span class="error-msg" id="passwordError"></span>
        </div>

        <button type="submit" class="btn btn-full">Login</button>
    </form>

    <p class="form-link">Don't have an account? <a href="{{ url_for('register') }}">Register here</a></p>
</div>
{% endblock %}
